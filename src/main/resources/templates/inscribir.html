<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" type="text/css" th:href="@{/css/general.css}" />
  </head>
  <body>
    <div th:replace="fragmentos :: navbar"></div>

    <main class="container py-5">

      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow">
            <div class="card-header text-center">
              <h2 class="mb-0">Inscripción de Materias</h2>
            </div>

            <div class="card-body">
              <div class="alert alert-light border">
                <strong>Estudiante:</strong>
                <span th:text="${estudiante.nombre}"></span>
              </div>

              <form
                th:action="@{/student/{id}/inscribir(id=${estudiante.id})}"
                method="post"
              >
                <h5 class="mb-3">Cursos disponibles</h5>

                <div class="list-group mb-4">
                  <label
                    th:each="curso : ${cursos}"
                    class="list-group-item d-flex justify-content-between align-items-center"
                  >
                    <div>
                      <input
                        class="form-check-input me-3"
                        type="checkbox"
                        name="cursosIds"
                        th:value="${curso.id}"
                        th:checked="${cursosInscritos.contains(curso.id)}"
                      />

                      <span class="fw-semibold" th:text="${curso.nombre}">
                      </span>
                    </div>

                    <span
                      class="badge bg-secondary"
                      th:text="'Semestre ' + ${curso.semestre}"
                    >
                    </span>
                  </label>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg">
                  Guardar inscripción
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div th:replace="fragmentos :: footer"></div>
  </body>
</html>
